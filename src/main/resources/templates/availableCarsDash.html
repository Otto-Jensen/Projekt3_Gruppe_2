<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledige biler</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: lightgray;
        }

        /* TOPBAR */

        .topbar {
            background-color: #240000;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .topbar button {
            background-color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .search {
            margin-left: auto;
        }

        .search input {
            padding: 8px;
            border-radius: 20px;
            border: none;
            width: 220px;
        }

        /* CARDS */

        .car-container {
            display: flex;
            gap: 40px;
            padding: 50px;
        }

        .car-card {
            background-color: white;
            width: 180px;
            border: 1px solid gray;
            padding: 10px;
            box-shadow: 2px 2px 5px gray;
        }

        .car-card img {
            width: 100%;
            height: auto;
        }

        .rent-btn {
            background-color: limegreen;
            border: none;
            padding: 5px 20px;
            cursor: pointer;
            float: right;
        }

    </style>

</head>
<body>

<div class="topbar">

    <button>Ledige biler</button>
    <button>Ikke ledige biler</button>
    <button>Forhåndssalg af biler</button>
    <button>Økonomi</button>

    <div class="search">
        <input type="text" placeholder="Søg bil">
    </div>

</div>

<div class="car-container">

    <div class="car-card">

        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1000&auto=format&fit=crop" alt="Bil">

        <p>Brand: Volvo</p>
        <p>Type: Elektrisk</p>
        <p>Model år: 2002</p>

        <button class="rent-btn">Lej</button>

    </div>

    <div class="car-card">

        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1000&auto=format&fit=crop" alt="Bil">

        <p>Brand: Volvo</p>
        <p>Type: Elektrisk</p>
        <p>Model år: 2002</p>

        <button class="rent-btn">Lej</button>

    </div>

    <div class="car-card">

        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1000&auto=format&fit=crop" alt="Bil">

        <p>Brand: Volvo</p>
        <p>Type: Elektrisk</p>
        <p>Model år: 2002</p>

        <button class="rent-btn">Lej</button>

    </div>

</div>

</body>
</html>
