<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ledige Biler</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .car-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .car-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0px 0px 10px lightgray;
        }

        .status {
            color: green;
            font-weight: bold;
        }

    </style>

</head>
<body>

<h1>Ledige Biler</h1>

<div class="car-container">

    <div class="car-card">
        <h2>Tesla Model 3</h2>
        <p>Status: <span class="status">Ledig</span></p>
    </div>

    <div class="car-card">
        <h2>BMW i4</h2>
        <p>Status: <span class="status">Ledig</span></p>
    </div>

    <div class="car-card">
        <h2>Audi Q4 E-tron</h2>
        <p>Status: <span class="status">Ledig</span></p>
    </div>

</div>

</body>
</html>
