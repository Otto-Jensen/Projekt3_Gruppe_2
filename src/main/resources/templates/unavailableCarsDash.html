<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledige biler</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: lightgray;
        }

        /* TOPBAR */

        .topbar {
            background-color: #240000;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .topbar button, .topbar-btn {
            background-color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .create-btn{
            background-color:green;
            color:white;
        }

        .create-btn-container{
            display:flex;
            justify-content: center;
            margin-top:30px;
        }

        .search {
            margin-left: auto;
        }

        .search input {
            padding: 8px;
            border-radius: 20px;
            border: none;
            width: 220px;
        }

        /* CARDS */

        .car-container {
            display: flex;
            gap: 40px;
            padding: 50px;
        }

        .car-card {
            background-color: white;
            width: 180px;
            border: 1px solid gray;
            padding: 10px;
            box-shadow: 2px 2px 5px gray;
        }

        .car-card img {
            width: 100%;
            height: auto;
        }

        .rent-btn {
            background-color: limegreen;
            border: none;
            padding: 5px 20px;
            cursor: pointer;
            float: right;
        }

    </style>

</head>
<body>

<div class="topbar">

    <a th:href="@{availableCarsDash.html}"><button>Ledige biler</button></a>
    <button>Ikke ledige biler</button>
    <button>Forhåndssalg af biler</button>
    <button>Økonomi</button>

    <div class="search">
        <input type="text" placeholder="Søg bil">
    </div>

</div>

<div class="car-container">

    <div class="car-card" th:each="car : ${carList}">

        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1000&auto=format&fit=crop" alt="Bil">

        <p th:text="'Brand: ' + ${car.brand}">Brand</p>
        <p th:text="'Model: ' + ${car.model}">Model</p>
        <p th:text="'Farve: ' + ${car.color}">Farve</p>

        <a th:href="@{/car/{id}(id=${car.id})}">
            <button class="rent-btn">Lej</button>
        </a>


    </div>
</div>

</body>
</html>
