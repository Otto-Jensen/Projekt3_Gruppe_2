<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kunde oplysninger</title>

    <style>

        body{
            font-family: Arial;
            background-color: lightgray;
        }

        .container{
            width:500px;
            margin:50px auto;
            background-color:white;
            padding:30px;
            border-radius:10px;
            box-shadow:2px 2px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            padding:10px 20px;
            background-color:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Opret kunde</h1>

    <h3 th:text="${car.brand} + ' ' + ${car.model}"></h3>

    <form>

        <label>Navn</label>
        <input type="text" name="name">

        <label>Telefonnummer</label>
        <input type="number" name="phoneNumber">

        <label>Email</label>
        <input type="email" name="email">

        <button type="submit">
            Gem kunde
        </button>

    </form>

</div>

</body>
</html>
