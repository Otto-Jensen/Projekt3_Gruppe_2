<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opret bil</title>
    <style>
        body { font-family: Arial; background-color: lightgray; margin: 0; }

        .topbar {
            background-color: #240000;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .topbar button {
            background-color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid gray;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button[type="submit"] {
            margin-top: 25px;
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="topbar">
    <a th:href="@{/}"><button>Ledige biler</button></a>
    <a th:href="@{/unavailableCars}"><button>Ikke ledige biler</button></a>
</div>

<div class="container">
    <h1>Opret ny bil</h1>

    <form action="/createCar" method="post">
        <label>Vognnummer</label>
        <input type="text" name="cartNumber" required>

        <label>Stelnummer (VIN)</label>
        <input type="text" name="vin" required>

        <label>Mærke</label>
        <input type="text" name="brand" required>

        <label>Model</label>
        <input type="text" name="model" required>

        <label>Farve</label>
        <input type="text" name="color" required>

        <button type="submit">Gem bil</button>
    </form>
</div>

</body>
</html>
