
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Bil detaljer</title>

    <style>

        body {
            font-family: Arial;
            background-color: lightgray;
            margin: 0;
        }

        .container {
            width: 900px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
        }

        .container img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .info {
            margin-top: 20px;
        }

        .info p {
            font-size: 18px;
        }

        .section {
            margin-top: 30px;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 8px;
        }

        .section h3 {
            margin-top: 0;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            margin-right: 10px;
            margin-top: 10px;
        }

        .btn-green  { background-color: green; }
        .btn-blue   { background-color: steelblue; }
        .btn-orange { background-color: darkorange; }

        select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid gray;
            margin-right: 10px;
        }

    </style>

</head>

<body>

<div class="container">


    <div th:switch="${car.brand}">
        <img th:case="'Toyota'" src="https://images.unsplash.com/photo-1621007947382-bb3c3994e3fb?q=80&w=1000&auto=format&fit=crop">
        <img th:case="'Ford'"   src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1000&auto=format&fit=crop">
        <img th:case="'BMW'"    src="https://images.unsplash.com/photo-1556189250-72ba954cfc2b?q=80&w=1000&auto=format&fit=crop">
        <img th:case="'Volvo'"  src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1000&auto=format&fit=crop">
        <img th:case="*"        src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1000&auto=format&fit=crop">
    </div>

    <h1 th:text="${car.brand} + ' ' + ${car.model}"></h1>


    <div class="info">
        <p><b>Farve:</b>      <span th:text="${car.color}"></span></p>
        <p><b>Status:</b>     <span th:text="${car.status}"></span></p>
        <p><b>Stelnummer:</b> <span th:text="${car.vin}"></span></p>
        <p><b>Vognnummer:</b> <span th:text="${car.cartNumber}"></span></p>
    </div>


    <div class="section">
        <h3>Skift status</h3>
        <form th:action="@{/car/status/{id}(id=${car.id})}" method="post">
            <select name="status">
                <option value="AVAILABLE">Ledig</option>
                <option value="RENTED">Udlejet</option>
                <option value="UNDER_REPAIR">Under reparation</option>
                <option value="SOLD">Solgt</option>
            </select>
            <button type="submit" class="btn btn-blue">Gem status</button>
        </form>
    </div>


    <div class="section" th:if="${rental != null}">
        <h3>Lejeaftale</h3>
        <p><b>Startdato:</b>  <span th:text="${rental.startDato}"></span></p>
        <p><b>Slutdato:</b>   <span th:text="${rental.endDate}"></span></p>
        <p><b>Pris:</b>       <span th:text="${rental.price} + ' kr.'"></span></p>
        <p><b>Afhentning:</b> <span th:text="${rental.location}"></span></p>

        <div th:if="${costumer != null}">
            <h3>Kunde</h3>
            <p><b>Navn:</b>    <span th:text="${costumer.name}"></span></p>
            <p><b>Telefon:</b> <span th:text="${costumer.phoneNumber}"></span></p>
            <p><b>Email:</b>   <span th:text="${costumer.email}"></span></p>
        </div>
    </div>


    <div class="section" th:if="${damageReport != null}">
        <h3>Skaderapport</h3>
        <p><b>Dato:</b>        <span th:text="${damageReport.date}"></span></p>
        <p><b>Total pris:</b>  <span th:text="${damageReport.totalPrice} + ' kr.'"></span></p>
    </div>


    <div style="margin-top: 20px;">


        <a th:if="${rental == null}" th:href="@{/customerInfo/{id}(id=${car.id})}">
            <button class="btn btn-green">Opret lejeaftale</button>
        </a>


        <a th:if="${damageReport == null}" th:href="@{/damageReport/{id}(id=${car.id})}">
            <button class="btn btn-orange">Tilføj skaderapport</button>
        </a>

        <a th:href="@{/}">
            <button class="btn btn-blue">Tilbage</button>
        </a>

    </div>

</div>

</body>
</html>
